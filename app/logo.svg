<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="SOC Playbook">

  <!-- ── Football field icon ── -->
  <!-- Outer field boundary -->
  <rect x="2" y="6" width="40" height="36" rx="3" fill="#1a6b2e"/>
  <!-- End-zone stripe top -->
  <rect x="2" y="6" width="40" height="7" rx="3" fill="#145724"/>
  <!-- End-zone stripe bottom -->
  <rect x="2" y="35" width="40" height="7" rx="3" fill="#145724"/>
  <!-- Clip so stripes don't bleed outside field rect -->
  <rect x="2" y="6" width="40" height="36" rx="3" fill="none" stroke="#1a6b2e" stroke-width="0"/>

  <!-- Yard lines (horizontal white lines across field) -->
  <line x1="6"  y1="18" x2="38" y2="18" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>
  <line x1="6"  y1="24" x2="38" y2="24" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>
  <line x1="6"  y1="30" x2="38" y2="30" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>

  <!-- Centre line (50 yard) -->
  <line x1="6" y1="24" x2="38" y2="24" stroke="#ffffff" stroke-width="1.4" opacity="0.9"/>

  <!-- Hash marks -->
  <line x1="17" y1="18" x2="17" y2="21" stroke="#ffffff" stroke-width="0.7" opacity="0.7"/>
  <line x1="27" y1="18" x2="27" y2="21" stroke="#ffffff" stroke-width="0.7" opacity="0.7"/>
  <line x1="17" y1="27" x2="17" y2="30" stroke="#ffffff" stroke-width="0.7" opacity="0.7"/>
  <line x1="27" y1="27" x2="27" y2="30" stroke="#ffffff" stroke-width="0.7" opacity="0.7"/>

  <!-- Play route: dashed line curving up-right with arrowhead -->
  <!-- Route path: starts bottom-left cluster, breaks right, then shoots upfield -->
  <path d="M14 34 L14 27 Q14 21 22 19 L28 19" stroke="#facc15" stroke-width="1.6" stroke-dasharray="2.2 2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead at route end -->
  <polyline points="25,16.5 28,19 25,21.5" stroke="#facc15" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Second route: quick slant -->
  <path d="M22 34 L22 29 L30 23" stroke="#60a5fa" stroke-width="1.3" stroke-dasharray="1.8 2" fill="none" stroke-linecap="round"/>
  <polyline points="27.5,22 30,23 29,25.5" stroke="#60a5fa" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Players (O) offensive line at bottom -->
  <circle cx="10" cy="36" r="2"   fill="none" stroke="#ffffff" stroke-width="1.1"/>
  <circle cx="16" cy="36" r="2"   fill="none" stroke="#ffffff" stroke-width="1.1"/>
  <circle cx="22" cy="36" r="2"   fill="none" stroke="#ffffff" stroke-width="1.1"/>
  <circle cx="28" cy="36" r="2"   fill="none" stroke="#ffffff" stroke-width="1.1"/>
  <circle cx="34" cy="36" r="2"   fill="none" stroke="#ffffff" stroke-width="1.1"/>

  <!-- Field outer border -->
  <rect x="2" y="6" width="40" height="36" rx="3" stroke="#0f4a1d" stroke-width="1"/>

</svg>
