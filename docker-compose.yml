services:
  soc-playbooks:
    build: .
    image: soc-playbooks:latest
    container_name: soc-playbooks
    ports:
      - "9020:8080"
    restart: unless-stopped
    
    # ── Resource limits (prevent runaway processes) ─────────────────────
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # ── Logging configuration ──────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    
    # ── Health monitoring ──────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    
    volumes:
      # Custom-override playbooks: place files here mirroring playbooks-main/ structure.
      # A file at app/playbooks-custom/malware/pb01-ransomware-infection.json overrides the built-in.
      - ./app/playbooks-custom:/var/www/localhost/htdocs/playbooks
      #- ./app/playbooks-main:/var/www/localhost/htdocs/playbooks-main
    environment:
      # ── Active SIEM/tool tabs (exactly 6 shown) ───────────────────────────
      # Available values: splunk, kql, security_onion, qradar, sigma, sysmon,
      #   velociraptor, osquery, carbon_black, elastic, chronicle, crowdstrike,
      #   defender, opensearch, logrhythm
      - SIEM_TOOL_1=security_onion
      - SIEM_TOOL_2=sysmon
      - SIEM_TOOL_3=osquery
      - SIEM_TOOL_4=velociraptor
      - SIEM_TOOL_5=elastic
      - SIEM_TOOL_6=carbon_black
    labels:
      - "com.soc.description=SOC IR Playbook Library"
      - "com.soc.version=4.0"

# Docker named volume definition (disabled):
# volumes:
#   playbook-data:
#     driver: local
